<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#222222">
  <title>Claude Remote</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>C</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css?v=15">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-card">
      <h1>Claude Remote</h1>
      <p>Enter the access key from your agent</p>
      <div id="saved-keys"></div>
      <input type="password" id="token-input" placeholder="Access key" autofocus>
      <button id="auth-btn">Connect</button>
      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="sidebar-overlay" class="hidden"></div>
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo-wrapper"><div class="logo-small"></div></div>
        <h2>Claude Remote</h2>
        <button id="sidebar-close-btn" class="btn-icon" title="Close">✕</button>
      </div>
      <div class="agent-status">
        <span id="agent-dot" class="dot online"></span>
        <span id="agent-name">Agent</span>
        <span id="agent-meta"></span>
      </div>
      <div class="section-header">
        <span>Sessions</span>
        <button id="new-session-btn" title="New session">+</button>
      </div>
      <div id="session-list"></div>
      <div class="sidebar-divider"></div>
      <div class="section-header">
        <span>History</span>
      </div>
      <div id="history-list"></div>
      <div class="sidebar-footer">
        <button id="settings-btn" class="btn-secondary">Settings</button>
        <button id="logout-btn" class="btn-danger">Disconnect</button>
      </div>
    </aside>

    <main id="main">
      <div id="topbar">
        <button id="menu-btn" class="btn-icon" title="Menu"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
        <span id="topbar-title">Claude Remote</span>
        <button id="topbar-new-btn" class="btn-icon" title="New session">+</button>
        <button id="kill-session-btn" class="btn-danger hidden" title="Kill session">Kill</button>
      </div>
      <div id="no-session">
        <div class="empty-state">
          <div class="logo-large"></div>
          <h3>No active session</h3>
          <p>Create a new Claude Code session to get started</p>
          <button id="empty-new-btn">New Session</button>
        </div>
      </div>
      <div id="terminal-container" class="hidden"></div>
      <div id="chat-container" class="hidden">
        <div id="chat-messages"></div>
      </div>
      <div id="history-view" class="hidden">
        <div class="history-header">
          <button id="history-back" class="btn-ghost">&larr; Back</button>
          <span id="history-title"></span>
          <button id="history-resume" class="btn-sm">Resume</button>
        </div>
        <div id="history-messages"></div>
      </div>
      <div id="image-preview-bar" class="hidden">
        <div id="image-previews"></div>
      </div>
      <div id="input-bar" class="hidden">
        <button id="voice-btn" class="input-bar-btn" title="Voice input"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="17" x2="12" y2="21"/></svg></button>
        <button id="attach-btn" class="input-bar-btn" title="Attach image"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
        <input type="file" id="image-input" accept="image/*" multiple style="display:none">
        <input type="text" id="chat-input" placeholder="Message..." autocomplete="off">
        <button id="send-btn" class="input-bar-btn" title="Send"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
      </div>
    </main>
  </div>

  <div id="new-session-modal" class="modal hidden">
    <div class="modal-content">
      <h3>New Session</h3>
      <label for="cwd-input">Working directory</label>
      <input type="text" id="cwd-input" placeholder="~/Projects/my-project">
      <p class="hint">Path on the agent machine. Leave empty for home directory.</p>
      <div class="modal-actions">
        <button id="cancel-modal" class="btn-secondary">Cancel</button>
        <button id="create-session-btn">Create</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Settings</h3>
      <div id="settings-version" class="settings-info"></div>
      <label for="model-select">Model</label>
      <div id="model-options" class="model-options"></div>
      <label>Voice language</label>
      <div id="voice-lang-options" class="model-options"></div>
      <div class="modal-actions">
        <button id="settings-close" class="btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="app.js?v=12"></script>
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
    caches.keys().then(function(keys) {
      keys.forEach(function(k) { caches.delete(k); });
    });
  }
  </script>
</body>
</html>
