<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a1a">
  <title>Claude Remote</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="auth-screen">
    <div class="auth-card">
      <h1>Claude Remote</h1>
      <p>Enter the access key from your agent</p>
      <input type="password" id="token-input" placeholder="Access key" autofocus>
      <button id="auth-btn">Connect</button>
      <div id="auth-error" class="auth-error hidden"></div>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="sidebar-overlay" class="hidden"></div>
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Claude Remote</h2>
        <button id="sidebar-close-btn" class="btn-icon" title="Close">✕</button>
      </div>
      <div class="agent-status">
        <span id="agent-dot" class="dot online"></span>
        <span id="agent-name">Agent</span>
        <span id="agent-meta"></span>
      </div>
      <div class="section-header">
        <span>Sessions</span>
        <button id="new-session-btn" title="New session">+</button>
      </div>
      <div id="session-list"></div>
      <div class="section-header">
        <span>History</span>
      </div>
      <div id="history-list"></div>
      <div class="sidebar-footer">
        <button id="logout-btn">Disconnect</button>
      </div>
    </aside>

    <main id="main">
      <div id="mobile-topbar" class="mobile-only">
        <button id="menu-btn" class="btn-icon" title="Menu">☰</button>
        <span id="topbar-title">Claude Remote</span>
        <button id="topbar-new-btn" class="btn-icon" title="New session">+</button>
      </div>
      <div id="no-session">
        <div class="empty-state">
          <h3>No active session</h3>
          <p>Create a new Claude Code session to get started</p>
          <button id="empty-new-btn">New Session</button>
        </div>
      </div>
      <div id="terminal-container" class="hidden"></div>
      <div id="history-view" class="hidden">
        <div class="history-header">
          <button id="history-back" class="btn-ghost">&larr; Back</button>
          <span id="history-title"></span>
          <button id="history-resume" class="btn-sm">Resume</button>
        </div>
        <div id="history-messages"></div>
      </div>
      <button id="voice-btn" class="btn-icon hidden" title="Voice input">🎤</button>
      <div id="voice-indicator" class="hidden">
        <div class="voice-pulse"></div>
        <span>Listening...</span>
        <button id="voice-stop-btn" class="btn-ghost btn-sm">Stop</button>
      </div>
      <div id="session-bar" class="hidden">
        <span id="session-info"></span>
        <div class="session-bar-actions">
          <button id="kill-session-btn" class="btn-danger" title="Kill session">Kill</button>
        </div>
      </div>
    </main>
  </div>

  <div id="new-session-modal" class="modal hidden">
    <div class="modal-content">
      <h3>New Session</h3>
      <label for="cwd-input">Working directory</label>
      <input type="text" id="cwd-input" placeholder="~/Projects/my-project">
      <p class="hint">Path on the agent machine. Leave empty for home directory.</p>
      <div class="modal-actions">
        <button id="cancel-modal" class="btn-secondary">Cancel</button>
        <button id="create-session-btn">Create</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
  <script src="app.js"></script>
</body>
</html>
